name: 🚀 Release Draft

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'リリースバージョン（例: 1.2.0 または v1.2.0）'
        required: true
        type: string
      previous_tag:
        description: '前回タグ（空欄で自動検出）'
        required: false
        type: string

jobs:
  release-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Generate release notes
        uses: actions/github-script@v7
        with:
          script: |
            // 入力値の v プレフィックスを正規化（あってもなくても v1.2.0 形式に統一）
            const rawVersion = '${{ inputs.version }}';
            const version = rawVersion.startsWith('v') ? rawVersion : `v${rawVersion}`;
            const inputPreviousTag = '${{ inputs.previous_tag }}';

            // --- カテゴリ定義 ---
            // type → カテゴリ のマッピング（順序がリリースノートの出力順になる）
            const CATEGORIES = [
              {
                title: '✨ 新機能',
                types: ['feat'],
              },
              {
                title: '🐛 バグ修正',
                types: ['fix'],
              },
              {
                title: '♻️ 改善',
                types: ['refactor', 'perf'],
              },
              {
                title: '📝 ドキュメント・スタイル',
                types: ['docs', 'style'],
              },
              {
                title: '🔧 内部変更',
                types: ['chore', 'build', 'ci'],
              },
              {
                title: '⏪ 取り消し',
                types: ['revert'],
              },
              {
                title: '✅ テスト',
                types: ['test'],
              },
            ];

            // --- 前回タグの取得 ---
            let previousTag = inputPreviousTag.trim();
            let previousTagDate = null;

            if (!previousTag) {
              const { data: tags } = await github.rest.repos.listTags({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 10,
              });

              if (tags.length > 0) {
                previousTag = tags[0].name;
                console.log(`前回タグを自動検出: ${previousTag}`);
              } else {
                console.log('前回タグなし。全マージ済みPRを対象にします。');
              }
            }

            // 前回タグのコミット日時を取得
            if (previousTag) {
              const { data: tagRef } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${previousTag}`,
              });

              const sha = tagRef.object.sha;
              const { data: commit } = await github.rest.git.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: sha,
              });

              previousTagDate = commit.author.date;
              console.log(`前回タグ日時: ${previousTagDate}`);
            }

            // --- マージ済みPRの取得 ---
            const prs = [];
            let page = 1;

            while (true) {
              const { data } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'closed',
                base: 'main',
                sort: 'updated',
                direction: 'desc',
                per_page: 100,
                page,
              });

              if (data.length === 0) break;

              for (const pr of data) {
                if (!pr.merged_at) continue;

                // 前回タグ日時より古いPRは除外
                if (previousTagDate && new Date(pr.merged_at) <= new Date(previousTagDate)) {
                  // 日時でソートしているので、ここ以降は全て古い
                  page = Infinity;
                  break;
                }

                prs.push(pr);
              }

              if (page === Infinity) break;
              page++;
            }

            console.log(`対象PR数: ${prs.length}`);

            // --- PRタイトルから type を抽出 ---
            // フォーマット: "<gitmoji> <type>(<scope>): <subject>"
            //           or "<gitmoji> <type>: <subject>"
            const TYPE_REGEX = /^.+?\s+(\w+)[\((:]/;

            function extractType(title) {
              const match = title.match(TYPE_REGEX);
              return match ? match[1] : null;
            }

            // --- カテゴリ別に分類 ---
            const categorized = {};
            for (const cat of CATEGORIES) {
              categorized[cat.title] = [];
            }
            const others = [];
            const breakingChanges = [];

            for (const pr of prs) {
              const type = extractType(pr.title);
              const line = `- ${pr.title} ([#${pr.number}](${pr.html_url}))`;

              // BREAKING CHANGE の検出（PRテンプレートの「あり」チェックボックスが入っている場合）
              // PRテンプレート形式: "- [x] あり → 内容：..."
              if (pr.body && /^- \[x\] あり/m.test(pr.body)) {
                breakingChanges.push(line);
              }

              const category = CATEGORIES.find(cat => cat.types.includes(type));
              if (category) {
                categorized[category.title].push(line);
              } else {
                others.push(line);
              }
            }

            // --- Markdown生成 ---
            const lines = [];

            // BREAKING CHANGE セクション（冒頭に配置）
            if (breakingChanges.length > 0) {
              lines.push('## 💥 BREAKING CHANGES');
              lines.push('');
              lines.push('> ⚠️ 後方互換性のない変更が含まれています。移行手順を確認してください。');
              lines.push('');
              for (const line of breakingChanges) {
                lines.push(line);
              }
              lines.push('');
            }

            lines.push('## What\'s Changed');
            lines.push('');

            // カテゴリセクション
            for (const cat of CATEGORIES) {
              const items = categorized[cat.title];
              if (items.length === 0) continue;

              lines.push(`### ${cat.title}`);
              lines.push('');
              for (const item of items) {
                lines.push(item);
              }
              lines.push('');
            }

            // その他セクション
            if (others.length > 0) {
              lines.push('### 🗂️ その他');
              lines.push('');
              for (const item of others) {
                lines.push(item);
              }
              lines.push('');
            }

            // PR件数が0の場合
            if (prs.length === 0) {
              lines.push('*このリリースに含まれる変更はありません。*');
              lines.push('');
            }

            // Full Changelog リンク
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
            if (previousTag) {
              lines.push(`**Full Changelog**: ${repoUrl}/compare/${previousTag}...${version}`);
            } else {
              lines.push(`**Full Changelog**: ${repoUrl}/commits/${version}`);
            }

            const body = lines.join('\n');
            console.log('--- 生成されたリリースノート ---');
            console.log(body);

            // --- GitHub Release をドラフト作成 ---
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: version,
              body,
              draft: true,
              prerelease: false,
            });

            console.log(`ドラフトRelease作成完了: ${release.html_url}`);
