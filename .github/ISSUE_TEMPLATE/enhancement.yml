name: 💡 Enhancement
labels: ["type:enhancement"]
title: "【Enh】"
description: 改善提案（既存の機能・仕様・構成などの改善提案）
body:

  - type: markdown
    attributes:
      value: |
        > Enhancement は不具合ではないが、機能・仕様・構成・ドキュメントなどを改善する提案です。
        > 階層構造が必要な場合は Sub-issue で管理します。
        > 作成後、Project 上で Layer / Priority / Area を設定してください。
        > Layer は対応規模に応じて種別（Epic / Feature / Task）を設定してください。

  - type: textarea
    id: overview
    attributes:
      label: 🔍 改善の概要
      description: 何を改善するか、一言で説明します。
      placeholder: 例）task.yml の完了条件フィールドの id を acceptance から completion に統一する
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: 📋 現状
      description: 現在どのような状態か。改善前の状況を記述します。
      placeholder: 例）task.yml の完了条件フィールドの id が acceptance になっており、他テンプレートの completion と不一致
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 🎯 改善提案
      description: どのように改善するか。期待する状態・変更内容を記述します。
      placeholder: 例）id を completion に変更し、epic / feature / task で統一する
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 💬 理由・背景
      description: なぜこの改善が必要か。動機・メリットを記述します。
      placeholder: 例）自動化スクリプトやフィルタリングで id を参照する際に不一致が問題になるため
    validations:
      required: false

  - type: textarea
    id: completion
    attributes:
      label: ✅ 完了条件
      description: 何をもってこの改善が完了したと判断するか。
      placeholder: |
        - [ ] 条件1
        - [ ] 条件2
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: 📝 備考
      description: 参考情報・制約・注意点など。
      placeholder: 関連ドキュメント、外部リンク、注意点など
    validations:
      required: false
